name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Notion 의 변경 사항을 정기적으로 반영하기 위해 30분마다 빌드 (필요 시 조정)
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f yarn.lock ]; then
            echo "name=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "name=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ steps.pm.outputs.name }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Build (next export)
        env:
          # notion-client(비공식 API)를 사용하므로 NOTION_TOKEN 은 필요 없습니다.
          # 노션 DB 페이지가 "웹에 게시(Share to web)" 되어 있으면 빌드 시 자동으로 가져옵니다.
          GITHUB_PAGES: "true"
          # 사용자 페이지(imwebme.github.io)가 아닌 프로젝트 페이지에 배포되므로 basePath 필요
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          if [ -f yarn.lock ]; then
            yarn build
          else
            npm run build
          fi
          # GitHub Pages 가 Jekyll 처리를 건너뛰도록 .nojekyll 보장
          touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
